<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TreadVault</title>

<style>

body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#000;
  color:#fff;
}

/* NAV */
.nav {
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  z-index:10;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

.nav a {
  color:white;
  margin:0 15px;
  text-decoration:none;
}

.call-btn {
  background:gold;
  color:black;
  padding:10px 20px;
  border-radius:25px;
}

/* HERO */
.hero {
  height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.9)),
    url("assets/hero.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
  padding:0 80px;
}

.hero-content {
  max-width:650px;
}

.hero h1 {
  font-size:65px;
  line-height:1.05;
}

.hero p {
  opacity:.85;
  margin-top:15px;
}

.hero-buttons {
  margin-top:25px;
}

.hero-buttons a {
  padding:15px 30px;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
  margin-right:15px;
}

.reserve {
  background:gold;
  color:black;
}

.call2 {
  border:2px solid gold;
  color:gold;
}

/* SECTION */
.section {
  padding:120px 40px;
  text-align:center;
}

/* PRICING */
.pricing {
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.price-card {
  width:260px;
  padding:40px;
  border-radius:20px;
  border:1px solid rgba(255,215,0,.4);
  background:linear-gradient(145deg,#0a0a0a,#000);
  transition:.3s;
  position:relative;
}

.price-card:hover {
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(255,215,0,.5);
}

.price-card h3 {
  margin-bottom:10px;
}

.price-card h2 {
  font-size:48px;
}

.tag {
  position:absolute;
  top:-10px;
  right:15px;
  background:gold;
  color:black;
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
}

/* FORM */
.form {
  max-width:700px;
  margin:auto;
}

.form input,
.form select,
.form textarea {
  width:100%;
  padding:15px;
  margin:12px 0;
  border-radius:10px;
  border:1px solid rgba(255,215,0,.4);
  background:#000;
  color:white;
}

.form button {
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  background:gold;
  font-weight:bold;
}

/* FOOTER */
.footer {
  padding:60px;
  text-align:center;
  border-top:1px solid rgba(255,215,0,.2);
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <h2>TREADVAULT</h2>
  <div>
    <a href="#pricing">Pricing</a>
    <a href="#reserve">Reserve</a>
  </div>
  <a href="tel:2033075225" class="call-btn">Call</a>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Premium Tire Storage & Concierge Service</h1>
    <p>Secure indoor storage, pickup & return, and premium care.</p>

    <div class="hero-buttons">
      <a href="#reserve" class="reserve">Make Reservation</a>
      <a href="tel:2033075225" class="call2">Call / Text</a>
    </div>
  </div>
</div>

<!-- PRICING -->
<div id="pricing" class="section">
  <h1>Pricing Plans</h1>

  <div class="pricing">

    <div class="price-card">
      <h3>Monthly</h3>
      <h2>$99</h2>
    </div>

    <div class="price-card">
      <h3>Basic</h3>
      <h2>$299</h2>
    </div>

    <div class="price-card">
      <span class="tag">Popular</span>
      <h3>Concierge</h3>
      <h2>$449</h2>
    </div>

    <div class="price-card">
      <span class="tag">Best Value</span>
      <h3>Annual</h3>
      <h2>$799</h2>
    </div>

  </div>
</div>

<!-- FORM -->
<div id="reserve" class="section">
  <h1>Reserve</h1>

  <div class="form">
    <input placeholder="Full Name">
    <input placeholder="Phone">
    <input placeholder="Email">

    <select>
      <option>Select Package</option>
      <option>Monthly</option>
      <option>Basic</option>
      <option>Concierge</option>
      <option>Annual</option>
    </select>

    <input type="date">
    <textarea placeholder="Details"></textarea>

    <button>Submit Request</button>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <h2>TREADVAULT</h2>
  <p>(203) 307-5225</p>
</div>

</body>
</html>
