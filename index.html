<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TreadVault</title>

<style>
body { margin:0; background:#000; color:#fff; font-family:Arial; }

.nav {
display:flex; justify-content:space-between; padding:20px 40px;
border-bottom:1px solid gold;
}

.nav a { color:white; margin:0 10px; text-decoration:none; }

.hero {
height:90vh;
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
url("assets/hero.jpg") center/cover no-repeat;
display:flex; align-items:center; padding-left:60px;
}

.hero h1 { font-size:55px; }

.section { padding:80px 30px; text-align:center; }

.pricing { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }

.box {
border:1px solid gold; padding:30px; width:250px; border-radius:15px;
}

.form { max-width:700px; margin:auto; }

.form input, .form select, .form textarea {
width:100%; padding:12px; margin:10px 0;
background:black; border:1px solid gold; color:white;
}

button {
background:gold; border:none; padding:15px;
width:100%; border-radius:25px;
}
</style>

</head>
<body>

<!-- NAV -->
<div class="nav">
<h2>TREADVAULT</h2>
<div>
<a href="#pricing">Pricing</a>
<a href="#reserve">Reserve</a>
</div>
<a href="tel:2033075225">Call</a>
</div>

<!-- HERO -->
<div class="hero">
<h1>Premium Tire Storage & Concierge</h1>
</div>

<!-- PRICING -->
<div id="pricing" class="section">
<h1>Pricing</h1>

<div class="pricing">
<div class="box">$99<br>Monthly</div>
<div class="box">$299<br>Season</div>
<div class="box">$449<br>Concierge</div>
<div class="box">$799<br>Annual</div>
</div>
</div>

<!-- FORM -->
<div id="reserve" class="section">
<h1>Reserve</h1>

<form class="form" action="https://formspree.io/f/mpqbzbgj" method="POST">

<input name="name" placeholder="Full Name" required>
<input name="phone" placeholder="Phone" required>
<input name="email" placeholder="Email" required>

<!-- CAR SELECTOR -->
<select id="make" required>
<option>Select Make</option>
<option>Toyota</option>
<option>Honda</option>
<option>Lexus</option>
<option>BMW</option>
<option>Mercedes</option>
</select>

<select id="model" name="car_model" required>
<option>Select Model</option>
</select>

<select name="package">
<option>Monthly</option>
<option>Basic</option>
<option>Concierge</option>
<option>Annual</option>
</select>

<input type="date" name="date">

<textarea name="details" placeholder="Details"></textarea>

<button type="submit">Submit</button>

</form>
</div>

<script>
const models = {
Toyota:["Camry","Corolla","Rav4"],
Honda:["Civic","Accord","CRV"],
Lexus:["RX","NX","IS"],
BMW:["3 Series","5 Series","X5"],
Mercedes:["C Class","E Class","GLE"]
};

document.getElementById("make").addEventListener("change", function(){
let model = document.getElementById("model");
model.innerHTML = "";

models[this.value].forEach(car=>{
let option = document.createElement("option");
option.text = car;
option.value = car;
model.add(option);
});
});
</script>

</body>
</html>
