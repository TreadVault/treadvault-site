<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TreadVault</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1619767886558-efdc259cde1a?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.overlay {
  background: rgba(0,0,0,0.75);
  padding: 40px;
  border-radius: 10px;
}

h1 {
  font-size: 42px;
  margin-bottom: 20px;
}

p {
  font-size: 18px;
  margin-bottom: 30px;
}

.btn {
  background: #d4af37;
  color: black;
  padding: 15px 30px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
}

.section {
  padding: 60px 20px;
  text-align: center;
}

input, textarea {
  width: 90%;
  max-width: 400px;
  margin: 10px auto;
  padding: 12px;
  border-radius: 5px;
  border: none;
}

button {
  background: #d4af37;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="hero">
  <div class="overlay">
    <h1>Luxury Tire Storage & Concierge</h1>
    <p>Secure indoor storage with white-glove pickup & delivery.</p>
    <a href="#form" class="btn">Make a Reservation</a>
  </div>
</div>

<div class="section">
  <h2>Why TreadVault?</h2>
  <p>Secure • Climate Controlled • Pickup & Delivery • Luxury Vehicle Care</p>
</div>

<div class="section" id="form">
  <h2>Request Your Reservation</h2>

  <form action="https://formspree.io/f/yourID" method="POST">
    <input type="text" name="name" placeholder="Name" required><br>
    <input type="email" name="email" placeholder="Email" required><br>
    <input type="text" name="vehicle" placeholder="Vehicle Make / Model"><br>

    <!-- DATE PICKER -->
    <input type="date" name="pickup_date" required><br>

    <textarea name="message" placeholder="Details"></textarea><br>

    <button type="submit">Submit</button>
  </form>
</div>

</body>
</html>
